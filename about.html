<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Books Web</title>
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">

            <a href="#" class="navbar-brand fs-2">Books Web</a>

            <a href="#" class="text-white btn btn-danger">Home</a>

            <button id="addBookBtn" class="btn btn-danger">
                Add Book
            </button>

        </div>
    </nav>

    <div class="container mt-4">
        <ul id="bookList" class="list-group"></ul>
    </div>

    <script>
        document.getElementById("addBookBtn").addEventListener("click", function () {

            let li = document.createElement("li");

            li.className = "list-group-item";

            li.textContent = "New Book";

            document.getElementById("bookList").appendChild(li);

        });
    </script>

</body>
</html>
